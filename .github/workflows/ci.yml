name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (test layer caching)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: kilo-docker:pr-test

      - name: Verify kilo is installed
        run: docker run --rm kilo-docker:pr-test kilo --version
