name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build base image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ghcr.io/mbabic84/kilo-docker:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      - name: Verify kilo is installed
        run: docker run --rm ghcr.io/mbabic84/kilo-docker:latest kilo --version
