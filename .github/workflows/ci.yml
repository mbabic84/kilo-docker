name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (test layer caching)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ghcr.io/mbabic84/kilo-docker:latest

      - name: Verify kilo is installed
        run: docker run --rm ghcr.io/mbabic84/kilo-docker:latest kilo --version

      - name: Build full variant
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.full
          load: true
          tags: kilo-docker:latest-full
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify full variant
        run: docker run --rm kilo-docker:latest-full kilo --version
