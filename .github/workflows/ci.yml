name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Build host binary
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/kilo-docker

      - name: Build container binary
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/kilo-entrypoint

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $HOME/.local/bin v2.11.4

      - name: Run golangci-lint
        run: $HOME/.local/bin/golangci-lint run ./... --timeout=5m

      - name: Run tests with race detector
        run: go test -race ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build base image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      - name: Verify kilo is installed
        run: docker run --rm ghcr.io/${{ github.repository }}:latest kilo --version
