name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure git for SSH
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git remote set-url origin "git@github.com:${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        id: release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Build host binaries
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        run: |
          set -e
          VERSION="${{ steps.release.outputs.new_release_version }}"
          KILO_VERSION=$(grep -oP 'ARG KILO_VERSION=\K[0-9.]+' Dockerfile)
          for OS_ARCH in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            OS="${OS_ARCH%%-*}"
            ARCH="${OS_ARCH##*-}"
            CGO_ENABLED=0 GOOS=$OS GOARCH=$ARCH go build \
              -ldflags="-s -w -X main.version=${VERSION} -X main.kiloVersion=${KILO_VERSION}" \
              -o "kilo-docker-${OS_ARCH}" \
              ./cmd/kilo-docker
          done

      - name: Upload binaries to release
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        run: |
          gh release upload "v${{ steps.release.outputs.new_release_version }}" \
            kilo-docker-linux-amd64 \
            kilo-docker-linux-arm64 \
            kilo-docker-darwin-amd64 \
            kilo-docker-darwin-arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.release.outputs.new_release_version }},enable=${{ steps.release.outputs.new_release_version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.release.outputs.new_release_version }},enable=${{ steps.release.outputs.new_release_version != '' }}
            type=semver,pattern={{major}},value=v${{ steps.release.outputs.new_release_version }},enable=${{ steps.release.outputs.new_release_version != '' }}

      - name: Build and push
        if: ${{ steps.release.outputs.new_release_published == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max
