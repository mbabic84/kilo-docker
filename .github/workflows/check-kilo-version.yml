name: Check Kilo Version

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get latest Kilo release
        id: latest
        run: |
          MAX_ATTEMPTS=10
          for i in $(seq 1 $MAX_ATTEMPTS); do
            LATEST=$(curl -sSf "https://api.github.com/repos/Kilo-Org/kilocode/releases?per_page=30" | jq -r '[.[] | select(.tag_name | test("^v[0-9]")) | .tag_name] | first' | sed 's/^v//') && break
            BACKOFF=$((2 ** (i - 1)))
            echo "::warning::Attempt $i/$MAX_ATTEMPTS failed, retrying in ${BACKOFF}s..."
            sleep $BACKOFF
          done
          if [ -z "$LATEST" ]; then
            echo "::error::Failed to fetch latest Kilo version after $MAX_ATTEMPTS attempts"
            exit 1
          fi
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Get current Kilo version from Dockerfile
        id: current
        run: |
          CURRENT=$(grep -oP 'ARG KILO_VERSION=\K[0-9.]+' Dockerfile)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        id: compare
        run: |
          echo "Current: ${{ steps.current.outputs.version }}"
          echo "Latest:  ${{ steps.latest.outputs.version }}"
          if [ "${{ steps.current.outputs.version }}" != "${{ steps.latest.outputs.version }}" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Dockerfile
        if: steps.compare.outputs.needs_update == 'true'
        env:
          NEW_VERSION: ${{ steps.latest.outputs.version }}
        run: |
          sed -i "s/ARG KILO_VERSION=.*/ARG KILO_VERSION=$NEW_VERSION/" Dockerfile

      - name: Create Pull Request
        if: steps.compare.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "feat: bump Kilo CLI to v${{ steps.latest.outputs.version }}"
          branch: chore/kilo-${{ steps.latest.outputs.version }}
          title: "feat: bump Kilo CLI to v${{ steps.latest.outputs.version }}"
          body: |
            Automated update for Kilo CLI.

            | | Version |
            |---|---|
            | Current | `${{ steps.current.outputs.version }}` |
            | Latest | `${{ steps.latest.outputs.version }}` |

            Release: https://github.com/Kilo-Org/kilocode/releases/tag/v${{ steps.latest.outputs.version }}
