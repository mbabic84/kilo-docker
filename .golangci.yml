# golangci-lint configuration
# Committed to ensure reproducible linting across environments

version: "2"

run:
  go: "1.26"
  timeout: 5m

linters:
  default: none

  enable:
    - staticcheck
    - errcheck
    - dupl
    - gocyclo
    - gosec

  exclusions:
    generated: strict

    paths:
      - generated$
      - vendor$
      - third_party$

    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - dupl
          - gosec
      - path: cmd/kilo-docker/handle_backup\.go
        text: 'G301|G204|G304:'
        linters:
          - gosec
      - path: cmd/kilo-docker/args\.go
        source: '^func buildContainerArgs\('
        linters:
          - gocyclo
      - path: cmd/kilo-docker/handle_sessions\.go
        source: '^func handleSessions\('
        linters:
          - gocyclo
      - path: cmd/kilo-docker/main\.go
        source: '^func (main|runContainer)\('
        linters:
          - gocyclo
      - path: cmd/kilo-entrypoint/api\.go
        source: '^func \(s \*Syncer\) apiRequest\('
        linters:
          - gocyclo
      - path: cmd/kilo-entrypoint/main\.go
        source: '^func main\('
        linters:
          - gocyclo
      - path: cmd/kilo-entrypoint/userinit\.go
        source: '^func runUserInit\('
        linters:
          - gocyclo
      - path: cmd/kilo-entrypoint/watcher\.go
        source: '^func runWatcher\('
        linters:
          - gocyclo
      - path: cmd/kilo-entrypoint/(config|hash|init|login|sync_content|updatecfg|userinit)\.go
        text: 'G30(1|2|4|6):'
        linters:
          - gosec
      - path: cmd/kilo-entrypoint/backup\.go
        text: 'G(304|110|115|122):'
        linters:
          - gosec
      - path: cmd/kilo-entrypoint/hash\.go
        text: 'G703:'
        linters:
          - gosec
      - path: cmd/kilo-docker/(docker|ssh|volume)\.go
        text: 'G(204|304|703):'
        linters:
          - gosec
      - path: cmd/kilo-docker/handlers\.go
        text: 'G(107|302|304):'
        linters:
          - gosec
      - path: cmd/kilo-entrypoint/(init|login|main|userinit|zellijattach)\.go
        text: 'G(107|204|704|703|122|115|702):'
        linters:
          - gosec
      - path: cmd/kilo-entrypoint/(config|tokens|sync_content|zellijattach)\.go
        text: 'G304:'
        linters:
          - gosec
      - path: cmd/kilo-entrypoint/crypto\.go
        text: 'G115:'
        linters:
          - gosec
      - path: cmd/kilo-entrypoint/watcher\.go
        text: 'G(115|602):'
        linters:
          - gosec

  settings:
    dupl:
      threshold: 50
    
    gocyclo:
      min-complexity: 20
    
    errcheck:
      check-type-assertions: false

    staticcheck:
      checks: ["all"]

output:
  formats:
    text:
      path: stdout
      color: true
      print-issued-lines: true
      print-linter-name: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
